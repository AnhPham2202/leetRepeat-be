services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leetrepeat-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3000
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: leetrepeat-caddy
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
